<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediaHub — Медиахаб для молодёжных центров</title>
<script src="/js/react.min.js"></script>
<script src="/js/react-dom.min.js"></script>
<script src="/js/chart.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-light:#eff6ff;--blue-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;
  --yellow:#d97706;--yellow-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
  --gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
  --sidebar-w:240px;--radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
}
html,body,#root{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-900)}
#root{display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--gray-900);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{color:#fff;font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{color:var(--gray-400);font-size:11px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--gray-400);font-size:14px;font-weight:500;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--blue);color:#fff}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-user{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
.user-name{color:#fff;font-size:13px;font-weight:600}
.user-role-lbl{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-top:2px}
.r-admin{background:rgba(37,99,235,.3);color:#93c5fd}
.r-editor{background:rgba(22,163,74,.3);color:#86efac}
.r-observer{background:rgba(217,119,6,.3);color:#fcd34d}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:12px}
.content{padding:24px;flex:1}

/* Cards */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow)}
.card-p{padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100)}
.card-title{font-size:15px;font-weight:600}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-value{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:13px;color:var(--gray-500);margin-top:4px}
.stat-delta{font-size:12px;font-weight:600;margin-top:6px;color:var(--green)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}.btn-secondary:hover{background:var(--gray-200)}
.btn-danger{background:var(--red-light);color:var(--red)}.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-light);color:var(--green)}.btn-success:hover{background:#dcfce7}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-ghost{background:transparent;color:var(--gray-600)}.btn-ghost:hover{background:var(--gray-100)}

/* Status badges */
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px}
.s-draft{background:var(--gray-100);color:var(--gray-600)}
.s-scheduled{background:var(--yellow-light);color:var(--yellow)}
.s-published{background:var(--green-light);color:var(--green)}

/* Platform chips */
.pchip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--blue-light);color:var(--blue)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--gray-100);color:var(--gray-600);font-weight:500}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.04em;padding:10px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
td{padding:12px 16px;border-bottom:1px solid var(--gray-100);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* Forms */
.fg{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px}
input[type=text],input[type=email],input[type=datetime-local],textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;color:var(--gray-900);background:#fff;transition:border-color .15s;font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:130px}

/* Filters */
.filters-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.fsel{padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:#fff}
.srch{padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;min-width:220px}
.srch:focus{outline:none;border-color:var(--blue)}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-head{text-align:center;padding:8px 4px;font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
.cal-cell{min-height:100px;border:1px solid var(--gray-100);padding:6px;cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--blue-light)}
.cal-cell.other{background:var(--gray-50);opacity:.45}
.cal-cell.today{background:#eff6ff}
.cal-cell.today .cal-date{background:var(--blue);color:#fff}
.cal-date{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:4px}
.cal-post{font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cp-draft{background:var(--gray-200);color:var(--gray-700)}
.cp-scheduled{background:#fef3c7;color:#92400e}
.cp-published{background:#dcfce7;color:#166534}
.cal-more{font-size:10px;color:var(--blue);font-weight:600;padding:1px 4px;cursor:pointer}

/* Chart */
.chart-box{position:relative;height:260px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.modal-bd{padding:20px 24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:10px}

/* Notifications */
.notif-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--gray-100)}
.notif-item.unread{background:var(--blue-light)}
.ndot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:5px;flex-shrink:0}
.ndot.read{background:var(--gray-300)}

/* Steps */
.step-row{display:flex;align-items:center;gap:0;margin-bottom:24px}
.step{display:flex;align-items:center}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--gray-200);color:var(--gray-500);cursor:default}
.step.active .step-num{background:var(--blue);color:#fff}
.step.done .step-num{background:var(--green);color:#fff;cursor:pointer}
.step-lbl{font-size:12px;font-weight:600;color:var(--gray-500);margin-left:6px}
.step.active .step-lbl{color:var(--blue)}
.step-sep{height:2px;width:28px;background:var(--gray-200);margin:0 6px}
.step.done+.step-sep,.step.done .step-sep{background:var(--green)}

/* Template cards */
.tmpl-card{border:2px solid var(--gray-200);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s}
.tmpl-card:hover{border-color:var(--blue);background:var(--blue-light)}
.tmpl-card.sel{border-color:var(--blue);background:var(--blue-light)}
.tmpl-icon{font-size:28px;margin-bottom:8px}
.tmpl-name{font-size:14px;font-weight:700;color:var(--gray-800)}
.tmpl-desc{font-size:12px;color:var(--gray-500);margin-top:3px}

/* Platform toggle */
.pltoggle{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.pltoggle.on{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}

/* Tag input */
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);cursor:text;min-height:42px;align-items:center}
.tag-chip{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
.tag-x{cursor:pointer;font-size:14px;line-height:1}
.tag-ghost{display:none}

/* Misc utils */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.flex{display:flex}.gap2{gap:8px}.gap3{gap:12px}.ic{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt6{margin-top:24px}
.mb4{margin-bottom:16px}.mb6{margin-bottom:24px}
.ts{font-size:13px}.tx{font-size:11px}.tg{color:var(--gray-500)}
.fb{font-weight:700}.fs{font-weight:600}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:48px 24px;color:var(--gray-400)}
.empty-ico{font-size:48px;margin-bottom:12px}
.pbar{height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.preview{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:16px;white-space:pre-wrap;font-size:14px;line-height:1.6;max-height:260px;overflow-y:auto}
.toast{position:fixed;bottom:24px;right:24px;background:var(--gray-900);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:500;display:flex;align-items:center;gap:8px;animation:si .2s ease}
@keyframes si{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:900px){.stats-grid,.grid2,.grid4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;
const API='http://localhost:8000';

async function api(path,opts={}){
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json',...(opts.headers||{})},
    ...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Ошибка сервера')}
  return r.json();
}

const fmtDate=s=>{if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'})};
const fmtDt=s=>{if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})};
const fmtN=n=>n>=1000?(n/1000).toFixed(1)+'K':''+n;
const timeAgo=s=>{const d=(Date.now()-new Date(s))/1000;if(d<60)return'только что';if(d<3600)return Math.floor(d/60)+' мин назад';if(d<86400)return Math.floor(d/3600)+' ч назад';return Math.floor(d/86400)+' дн назад'};
const SL={'draft':'Черновик','scheduled':'Запланирован','published':'Опубликован'};
const PI={'vk':'🔵','telegram':'✈️'};
const RL={'admin':'Администратор','editor':'Редактор','observer':'Наблюдатель'};
const RC={'admin':'r-admin','editor':'r-editor','observer':'r-observer'};
const TICO={'announcement':'📢','results':'✅','vacancy':'🚀','grant':'💰'};

// Toast
function Toast({message,type,onHide}){
  useEffect(()=>{const t=setTimeout(onHide,3000);return()=>clearTimeout(t)},[]);
  const ic=type==='success'?'✅':type==='error'?'❌':'ℹ️';
  return React.createElement('div',{className:'toast'},ic,' ',message);
}

// Status badge
function SBadge({status}){
  const dot={draft:'○',scheduled:'◑',published:'●'}[status]||'○';
  return React.createElement('span',{className:`sbadge s-${status}`},dot,' ',SL[status]||status);
}

// Modal
function Modal({title,children,onClose,footer}){
  return React.createElement('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-hd'},
        React.createElement('span',{style:{fontWeight:700,fontSize:16}},title),
        React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:onClose},'✕')
      ),
      React.createElement('div',{className:'modal-bd'},children),
      footer&&React.createElement('div',{className:'modal-ft'},footer)
    )
  );
}

// Sidebar
function Sidebar({page,setPage,user,unread}){
  const items=[
    {id:'dashboard',icon:'📊',label:'Дашборд'},
    {id:'calendar',icon:'📅',label:'Календарь'},
    {id:'posts',icon:'📝',label:'Посты'},
    ...(user?.role!=='observer'?[{id:'new-post',icon:'✏️',label:'Создать пост'}]:[]),
    {id:'analytics',icon:'📈',label:'Аналитика'},
    ...(user?.role==='admin'?[{id:'settings',icon:'⚙️',label:'Настройки'}]:[]),
    {id:'notifications',icon:'🔔',label:'Уведомления',badge:unread},
  ];
  return React.createElement('div',{className:'sidebar'},
    React.createElement('div',{className:'sidebar-logo'},
      React.createElement('div',{className:'logo-icon'},'📡'),
      React.createElement('div',null,
        React.createElement('div',{className:'logo-text'},'MediaHub'),
        React.createElement('div',{className:'logo-sub'},'Молодёжные центры КК')
      )
    ),
    React.createElement('nav',{className:'sidebar-nav'},
      React.createElement('div',{className:'nav-section'},'Навигация'),
      items.map(it=>React.createElement('div',{key:it.id,className:`nav-item${page===it.id?' active':''}`,onClick:()=>setPage(it.id)},
        React.createElement('span',{className:'nav-icon'},it.icon),it.label,
        it.badge?React.createElement('span',{className:'nav-badge'},it.badge):null
      ))
    ),
    user&&React.createElement('div',{className:'sidebar-user'},
      React.createElement('div',{className:'avatar'},user.avatar||user.name?.[0]),
      React.createElement('div',null,
        React.createElement('div',{className:'user-name'},user.name),
        React.createElement('div',{className:`user-role-lbl ${RC[user.role]}`},RL[user.role])
      )
    )
  );
}

// Auth wrapper: login / register / verify
function Login({onLogin}){
  const [mode,setMode]=useState('login'); // 'login' | 'register' | 'verify'
  const [pendingEmail,setPendingEmail]=useState('');

  if(mode==='register')
    return React.createElement(RegisterForm,{
      onLogin,
      onCodeSent:email=>{setPendingEmail(email);setMode('verify');},
      onBack:()=>setMode('login')
    });
  if(mode==='verify')
    return React.createElement(VerifyForm,{
      email:pendingEmail,
      onLogin,
      onBack:()=>setMode('register')
    });
  return React.createElement(LoginForm,{onLogin,onRegister:()=>setMode('register')});
}

function LoginForm({onLogin,onRegister}){
  const [email,setEmail]=useState('admin@mediahub.ru');
  const [password,setPassword]=useState('demo');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const demos=[
    {e:'admin@mediahub.ru',l:'🔑 Администратор'},
    {e:'editor@mediahub.ru',l:'✏️ Редактор'},
    {e:'observer@mediahub.ru',l:'👁 Наблюдатель'},
  ];
  async function submit(ev){
    ev.preventDefault();setLoading(true);setErr('');
    try{const d=await api('/api/auth/login',{method:'POST',body:{email,password}});onLogin(d.user,d.token,d.groups);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--gray-900)'}},
    React.createElement('div',{style:{background:'#fff',borderRadius:16,padding:40,width:400,boxShadow:'0 25px 50px rgba(0,0,0,.3)'}},
      React.createElement('div',{style:{textAlign:'center',marginBottom:32}},
        React.createElement('div',{style:{fontSize:52,marginBottom:10}},'📡'),
        React.createElement('h1',{style:{fontSize:24,fontWeight:800,marginBottom:4}},'MediaHub'),
        React.createElement('p',{style:{color:'var(--gray-500)',fontSize:14}},'Медиахаб для молодёжных центров')
      ),
      React.createElement('form',{onSubmit:submit},
        React.createElement('div',{className:'fg'},
          React.createElement('label',null,'Email'),
          React.createElement('input',{type:'email',value:email,onChange:e=>setEmail(e.target.value),required})
        ),
        React.createElement('div',{className:'fg'},
          React.createElement('label',null,'Пароль'),
          React.createElement('input',{type:'password',value:password,onChange:e=>setPassword(e.target.value),required})
        ),
        err&&React.createElement('div',{style:{color:'var(--red)',fontSize:13,marginBottom:12}},err),
        React.createElement('button',{type:'submit',className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'12px'},disabled:loading},
          loading?'⏳ Входим...':'🚀 Войти')
      ),
      React.createElement('div',{style:{marginTop:16,textAlign:'center'}},
        React.createElement('span',{style:{fontSize:13,color:'var(--gray-500)'}},'Нет аккаунта? '),
        React.createElement('button',{type:'button',className:'btn btn-ghost btn-sm',onClick:onRegister,style:{display:'inline',padding:'0 4px',fontSize:13,color:'var(--primary)'}},'Зарегистрироваться')
      ),
      React.createElement('div',{style:{marginTop:20,borderTop:'1px solid var(--gray-200)',paddingTop:16}},
        React.createElement('p',{style:{fontSize:12,color:'var(--gray-400)',marginBottom:10}},'Демо-аккаунты:'),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6}},
          demos.map(d=>React.createElement('button',{key:d.e,type:'button',onClick:()=>{setEmail(d.e);setPassword('demo');},className:'btn btn-secondary btn-sm',style:{justifyContent:'flex-start',fontSize:12}},
            d.l,' ',React.createElement('span',{style:{color:'var(--gray-400)',marginLeft:4}},d.e)
          ))
        )
      )
    )
  );
}

function RegisterForm({onLogin,onCodeSent,onBack}){
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState('');

// Calendar
function Calendar({setPage,setEditPost}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const [posts,setPosts]=useState([]);
  const [sel,setSel]=useState(null);
  const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

  useEffect(()=>{
    const s=new Date(yr,mo,1).toISOString().slice(0,10);
    const e=new Date(yr,mo+1,0).toISOString().slice(0,10);
    api(`/api/calendar?start=${s}&end=${e}`).then(setPosts).catch(console.error);
  },[yr,mo]);

  function prev(){if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);}
  function next(){if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);}

  const dim=new Date(yr,mo+1,0).getDate();
  const sdow=(new Date(yr,mo,1).getDay()+6)%7;
  const weeks=[];let d=1-sdow;
  while(d<=dim){
    const wk=[];
    for(let i=0;i<7;i++,d++){
      const ok=d>=1&&d<=dim;
      const ds=new Date(yr,mo,d).toISOString().slice(0,10);
      const dp=posts.filter(p=>(p.scheduled_at||p.published_at||p.created_at||'').slice(0,10)===ds);
      wk.push({d,ok,ds,dp});
    }
    weeks.push(wk);
  }

  return React.createElement('div',{className:'content'},
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-header'},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12}},
          React.createElement('button',{className:'btn btn-secondary btn-sm',onClick:prev},'◀'),
          React.createElement('span',{style:{fontWeight:700,fontSize:16,minWidth:160,textAlign:'center'}},MONTHS[mo]+' '+yr),
          React.createElement('button',{className:'btn btn-secondary btn-sm',onClick:next},'▶')
        ),
        React.createElement('div',{style:{display:'flex',gap:12,fontSize:12}},
          ['published','scheduled','draft'].map(s=>React.createElement('span',{key:s,className:`cal-post cp-${s}`,style:{padding:'3px 8px'}},SL[s]))
        )
      ),
      React.createElement('div',{className:'cal-grid'},
        DAYS.map(d=>React.createElement('div',{key:d,className:'cal-head'},d)),
        weeks.map((wk,wi)=>wk.map((cell,di)=>{
          const isToday=cell.ok&&cell.d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
          return React.createElement('div',{key:`${wi}-${di}`,className:`cal-cell${!cell.ok?' other':''}${isToday?' today':''}`,onClick:()=>cell.ok&&setPage('new-post')},
            React.createElement('div',{className:'cal-date'},cell.ok?cell.d:''),
            cell.dp.slice(0,3).map(p=>React.createElement('div',{key:p.id,className:`cal-post cp-${p.status}`,title:p.title,onClick:e=>{e.stopPropagation();setSel(p)}},p.title)),
            cell.dp.length>3&&React.createElement('div',{className:'cal-more'},`+${cell.dp.length-3} ещё`)
          );
        }))
      )
    ),
    sel&&React.createElement(Modal,{title:sel.title,onClose:()=>setSel(null),
      footer:React.createElement('div',{style:{display:'flex',gap:8}},
        React.createElement('button',{className:'btn btn-secondary btn-sm',onClick:()=>setSel(null)},'Закрыть'),
        React.createElement('button',{className:'btn btn-primary btn-sm',onClick:()=>{setEditPost(sel);setPage('edit-post');setSel(null);}},'✏️ Открыть')
      )},
      React.createElement('div',null,React.createElement(SBadge,{status:sel.status}),React.createElement('div',{className:'preview mt4'},sel.content))
    )
  );
}

function PostEditor({editPost,setEditPost,setPage,showToast}){
  const isEdit=!!editPost;

  const [tmpls,setTmpls]=useState([]);

  const [title,setTitle]=useState(editPost?.title||'');
  const [content,setContent]=useState(editPost?.content||'');

  const [tags,setTags]=useState(editPost?.tags||[]);
  const [status,setStatus]=useState(editPost?.status||'draft');
  const [schedAt,setSchedAt]=useState(editPost?.scheduled_at?editPost.scheduled_at.slice(0,16):'');

    setGen(true);
    try{const d=await api('/api/generate-text',{method:'POST',body:{template_type:tmplType,fields}});setContent(d.text);setTitle(d.title);setStep(3);}
    catch(e){showToast(e.message,'error');}finally{setGen(false);}

// Analytics
function Analytics(){
  const [sum,setSum]=useState(null);
  const [tl,setTl]=useState([]);
  const [period,setPeriod]=useState('month');
  const lineRef=useRef(null);lineRef.chart=useRef(null);
  const barRef=useRef(null);barRef.chart=useRef(null);

  useEffect(()=>{api('/api/analytics/summary').then(setSum).catch(console.error);},[]);
  useEffect(()=>{api(`/api/analytics/timeline?period=${period}`).then(setTl).catch(console.error);},[period]);

  useEffect(()=>{
    if(!tl.length||!lineRef.current)return;
    if(lineRef.chart.current)lineRef.chart.current.destroy();
    lineRef.chart.current=new Chart(lineRef.current.getContext('2d'),{
      type:'line',
      data:{labels:tl.map(d=>d.label),datasets:[
        {label:'Просмотры',data:tl.map(d=>d.views),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.1)',tension:.4,fill:true},
        {label:'Реакции',  data:tl.map(d=>d.reactions),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.08)',tension:.4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}
    });
    return()=>{if(lineRef.chart.current)lineRef.chart.current.destroy();};
  },[tl]);

  useEffect(()=>{
    if(!sum?.platform_stats||!barRef.current)return;
    if(barRef.chart.current)barRef.chart.current.destroy();
    const d=sum.platform_stats;
    barRef.chart.current=new Chart(barRef.current.getContext('2d'),{
      type:'bar',
      data:{labels:d.map(x=>x.platform.toUpperCase()),datasets:[
        {label:'Постов',data:d.map(x=>x.count),backgroundColor:'#2563eb'},
        {label:'Просмотры (÷100)',data:d.map(x=>Math.round(x.views/100)),backgroundColor:'#16a34a'},
        {label:'Реакции',data:d.map(x=>x.reactions),backgroundColor:'#d97706'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}}}
    });
    return()=>{if(barRef.chart.current)barRef.chart.current.destroy();};
  },[sum]);

  if(!sum)return React.createElement('div',{className:'content'},'⏳ Загрузка...');
  const mc=[
    {icon:'👁',l:'Просмотров',v:fmtN(sum.total_views)},
    {icon:'❤️',l:'Реакций',v:fmtN(sum.total_reactions)},
    {icon:'💬',l:'Комментариев',v:fmtN(sum.total_comments)},
    {icon:'🔁',l:'Репостов',v:fmtN(sum.total_shares)},
  ];

  return React.createElement('div',{className:'content'},
    React.createElement('div',{className:'grid4',style:{marginBottom:24}},
      mc.map((c,i)=>React.createElement('div',{key:i,className:'stat-card'},
        React.createElement('div',{className:'stat-icon',style:{background:'var(--blue-light)'}},c.icon),
        React.createElement('div',{className:'stat-value'},c.v),
        React.createElement('div',{className:'stat-label'},c.l)
      ))
    ),
    React.createElement('div',{className:'card mb6'},
      React.createElement('div',{className:'card-header'},
        React.createElement('span',{className:'card-title'},'📈 Динамика охватов'),
        React.createElement('div',{style:{display:'flex',gap:8}},
          ['week','month','quarter'].map(p=>React.createElement('button',{key:p,className:`btn btn-sm ${period===p?'btn-primary':'btn-secondary'}`,onClick:()=>setPeriod(p)},
            {week:'Неделя',month:'Месяц',quarter:'Квартал'}[p]
          ))
        )
      ),
      React.createElement('div',{style:{padding:20}},React.createElement('div',{className:'chart-box'},React.createElement('canvas',{ref:lineRef})))
    ),
    React.createElement('div',{className:'grid2'},
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-header'},React.createElement('span',{className:'card-title'},'📊 Сравнение площадок')),
        React.createElement('div',{style:{padding:20}},React.createElement('div',{className:'chart-box',style:{height:200}},React.createElement('canvas',{ref:barRef})))
      ),
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-header'},React.createElement('span',{className:'card-title'},'🏆 Топ-5 постов')),
        sum.top_posts.map((p,i)=>React.createElement('div',{key:p.id,style:{padding:'12px 20px',borderBottom:'1px solid var(--gray-100)',display:'flex',gap:12,alignItems:'center'}},
          React.createElement('div',{style:{width:26,height:26,borderRadius:6,background:['#fbbf24','#9ca3af','#cd7c2f','#e5e7eb','#e5e7eb'][i],color:i<3?'#fff':'var(--gray-600)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,flexShrink:0}},i+1),
          React.createElement('div',{style:{flex:1,minWidth:0}},
            React.createElement('div',{className:'trunc',style:{fontSize:13,fontWeight:600}},p.title),
            React.createElement('div',{style:{fontSize:11,color:'var(--gray-400)',marginTop:3}},`👁 ${fmtN(p.views)} · ❤️ ${p.reactions} · 💬 ${p.comments}`)
          )
        ))
      )
    )
  );
}

// Notifications
function Notifications({onRead}){
  const [notifs,setNotifs]=useState([]);
  function load(){api('/api/notifications').then(setNotifs).catch(console.error);}
  useEffect(load,[]);
  async function markRead(id){await api(`/api/notifications/${id}/read`,{method:'PUT'});load();onRead();}
  const unread=notifs.filter(n=>!n.is_read).length;
  return React.createElement('div',{className:'content'},
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-header'},
        React.createElement('span',{className:'card-title'},'🔔 Уведомления'),
        unread>0&&React.createElement('span',{style:{fontSize:13,color:'var(--gray-400)'}},unread+' непрочитанных')
      ),
      notifs.length===0?React.createElement('div',{className:'empty'},React.createElement('div',{className:'empty-ico'},'🔔'),React.createElement('p',null,'Уведомлений нет')):
      notifs.map(n=>React.createElement('div',{key:n.id,className:`notif-item${!n.is_read?' unread':''}`},
        React.createElement('div',{className:`ndot${n.is_read?' read':''}`}),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{fontSize:13,color:'var(--gray-800)',lineHeight:1.4}},n.message),
          React.createElement('div',{style:{fontSize:11,color:'var(--gray-400)',marginTop:3}},timeAgo(n.created_at))
        ),
        !n.is_read&&React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>markRead(n.id)},'✓')
      ))
    )
  );
}

const var_r=12; // border-radius workaround

// App root
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [editPost,setEditPost]=useState(null);
  const [toast,setToast]=useState(null);
  const [unread,setUnread]=useState(0);

  useEffect(()=>{
    if(user)api('/api/notifications').then(d=>setUnread(d.filter(n=>!n.is_read).length)).catch(()=>{});
  },[user,page]);

  const showToast=(message,type='info')=>setToast({message,type});

  if(!user)return React.createElement(Login,{onLogin:(u)=>setUser(u)});

  const TITLES={dashboard:'📊 Дашборд',calendar:'📅 Календарь контента',posts:'📝 Посты',
    'new-post':'✏️ Создать пост','edit-post':'✏️ Редактировать пост',
    analytics:'📈 Аналитика',settings:'⚙️ Настройки',notifications:'🔔 Уведомления'};

  function renderPage(){
    switch(page){
      case 'dashboard':    return React.createElement(Dashboard,{setPage,setEditPost});
      case 'calendar':     return React.createElement(Calendar,{setPage,setEditPost});
      case 'posts':        return React.createElement(PostsList,{setPage,setEditPost,showToast,user});
      case 'new-post':     return React.createElement(PostEditor,{editPost:null,setEditPost,setPage,showToast});
      case 'edit-post':    return React.createElement(PostEditor,{editPost,setEditPost,setPage,showToast});
      case 'analytics':    return React.createElement(Analytics);
      case 'settings':     return React.createElement(Settings,{showToast});
      case 'notifications':return React.createElement(Notifications,{onRead:()=>setUnread(c=>Math.max(0,c-1))});
      default: return null;
    }
  }

  return React.createElement('div',{style:{display:'flex',width:'100%'}},
    React.createElement(Sidebar,{page,setPage,user,unread}),
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('span',{className:'topbar-title'},TITLES[page]||page),
        React.createElement('div',{className:'topbar-actions'},
          React.createElement('span',{style:{fontSize:12,color:'var(--gray-400)'}},new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})),
          user?.role!=='observer'&&React.createElement('button',{className:'btn btn-primary btn-sm',onClick:()=>{setEditPost(null);setPage('new-post');}},'+ Пост')
        )
      ),
      renderPage()
    ),
    toast&&React.createElement(Toast,{...toast,onHide:()=>setToast(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
